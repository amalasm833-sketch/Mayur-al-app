name: Build APK
on:
  workflow_dispatch:
    inputs:
      app_code:
        description: 'App Code'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - name: Create main.py
        run: |
          echo "${{ github.event.inputs.app_code }}" > main.py
      - name: Build with Buildozer
        uses: ArtemShatriy/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: master
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: package
          path: bin/*.apk
